<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aarushi Gupta</title>
<meta name="description" content="In memory of Aarushi Gupta, and the family-funded education fund created in her name.">
<link rel="canonical" href="https://aarushiguptamemorial.org/">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #FBF6EB; }
  @keyframes aRise { from { transform: translateY(20px); } to { transform: translateY(0); } }
  @keyframes aFade { from { transform: translateY(10px); } to { transform: translateY(0); } }
  @media (prefers-reduced-motion: reduce) {
    *[data-anim] { animation: none !important; opacity: 1 !important; transform: none !important; }
  }
</style>
<style> .ag-btn:hover { background:#C8841F !important; } </style>
</head>
<body>
<div style="background:#FBF6EB; min-height:100vh; width:100%; color:#2A2420; font-family:'Lora', Georgia, serif; -webkit-font-smoothing:antialiased; box-sizing:border-box;">

  <!-- top chrome: almost nothing -->
  <header data-anim style="display:flex; justify-content:space-between; align-items:center; padding:32px clamp(24px,5vw,72px); box-sizing:border-box; animation:aFade 1.2s ease forwards;">
    <span style="font-family:'Cormorant Garamond', serif; font-size:21px; letter-spacing:0.06em; color:#2A2420;">Aarushi Gupta</span>
    <nav style="display:flex; gap:28px; font-size:13.5px; letter-spacing:0.04em; color:#6B5D4F;">
      <a href="her.html" style="color:#6B5D4F; text-decoration:none;">Her</a>
      <a href="fund.html" style="color:#6B5D4F; text-decoration:none;">The Fund</a>
      <a href="her.html#reach" style="color:#6B5D4F; text-decoration:none;">Reach</a>
    </nav>
  </header>

  <!-- hero -->
  <main style="display:flex; align-items:center; justify-content:center; min-height:calc(100vh - 200px); padding:24px clamp(24px,5vw,72px) 0; box-sizing:border-box;">
    <div style="display:flex; flex-wrap:wrap; align-items:center; justify-content:center; gap:clamp(40px,6vw,96px); max-width:1140px; width:100%;">

      <!-- her photo, breathing margin -->
      <figure data-anim style="margin:0; flex:0 1 460px; max-width:460px; min-width:280px; animation:aRise 1.4s cubic-bezier(.2,.7,.2,1) forwards;">
        <div style="background:#FFFFFF; padding:14px; border-radius:3px; box-shadow:0 24px 60px -28px rgba(42,36,32,0.45), 0 2px 8px -4px rgba(42,36,32,0.25);">
          <img src="images/aarushi-hero.jpg" alt="Aarushi Gupta smiling, standing in front of a brightly painted wall of marigold and teal." style="display:block; width:100%; height:auto; border-radius:1px;">
        </div>
      </figure>

      <!-- name + line + paths -->
      <div style="flex:0 1 460px; min-width:280px; max-width:520px;">
        <p data-anim style="margin:0 0 14px; font-size:13px; letter-spacing:0.22em; text-transform:uppercase; color:#C8841F; font-family:'Lora',serif; animation:aFade 1.4s ease .25s forwards;">In memory of</p>

        <h1 data-anim style="margin:0; font-family:'Cormorant Garamond', serif; font-weight:500; line-height:0.92; letter-spacing:-0.005em; font-size:clamp(64px,9vw,128px); color:#2A2420; animation:aRise 1.4s cubic-bezier(.2,.7,.2,1) .15s forwards;">
          Aarushi<br><span style="font-weight:400; color:#3A332C;">Gupta</span>
        </h1>

        <!-- honest empty state for the family's one true line -->
        <div data-anim style="margin:30px 0 0; padding:18px 0 18px 22px; border-left:2px solid #E9BE6C; animation:aFade 1.6s ease .5s forwards;">
          <p style="margin:0; font-family:'Cormorant Garamond', serif; font-style:italic; font-weight:500; font-size:clamp(24px,3vw,34px); line-height:1.3; color:#3A332C;">
            The girl who was fire itself.
          </p>
        </div>

        <!-- three soft paths -->
        <div data-anim style="margin:40px 0 0; display:flex; flex-direction:column; gap:0; animation:aFade 1.8s ease .7s forwards;">
          <a href="her.html" style="display:flex; align-items:baseline; justify-content:space-between; gap:20px; padding:16px 2px; border-top:1px solid #E7DEC9; text-decoration:none; color:#2A2420;">
            <span style="font-family:'Cormorant Garamond',serif; font-size:24px; font-weight:500;">Her, in all her glory</span>
            <span style="font-size:18px; color:#C8841F;">&rarr;</span>
          </a>
          <a href="fund.html" style="display:flex; align-items:baseline; justify-content:space-between; gap:20px; padding:16px 2px; border-top:1px solid #E7DEC9; text-decoration:none; color:#2A2420;">
            <span style="font-family:'Cormorant Garamond',serif; font-size:24px; font-weight:500;">The Fund in her name</span>
            <span style="font-size:18px; color:#C8841F;">&rarr;</span>
          </a>
          <a href="her.html#reach" style="display:flex; align-items:baseline; justify-content:space-between; gap:20px; padding:16px 2px; border-top:1px solid #E7DEC9; border-bottom:1px solid #E7DEC9; text-decoration:none; color:#2A2420;">
            <span style="font-family:'Cormorant Garamond',serif; font-size:24px; font-weight:500;">Reach us, share a memory</span>
            <span style="font-size:18px; color:#C8841F;">&rarr;</span>
          </a>
        </div>
      </div>

    </div>
  </main>

  <footer style="text-align:center; padding:48px 24px 40px; font-size:12.5px; letter-spacing:0.04em; color:#B7A893;">
    The Aarushi Gupta Memorial Education Fund &nbsp;&middot;&nbsp; We give. We do not ask.
  </footer>

</div>
</body>
</html>
